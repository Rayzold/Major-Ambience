name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pinned version from package.json's `packageManager` field.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

  worker:
    name: sync worker (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Worker is intentionally outside the pnpm workspace (different
      # toolchain), so it has its own npm install + scripts.
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        working-directory: cloud/worker
        run: npm install

      - name: Typecheck
        working-directory: cloud/worker
        run: npm run typecheck

      - name: Test
        working-directory: cloud/worker
        run: npm test
