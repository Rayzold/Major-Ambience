packages:
  - "apps/*"
  - "packages/*"

# esbuild ships a native binary it downloads via a postinstall script.
# Trusted, widely-used build tool; safe to run.
allowBuilds:
  esbuild: true
  # msgpackr-extract ships a native binary; used transitively by an Expo
  # dependency. Safe to allow the postinstall.
  msgpackr-extract: true
